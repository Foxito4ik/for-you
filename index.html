<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для тебе ❤️</title>
    <style>
        /* Обов'язково: прибираємо всі відступи і ховаємо смуги прокрутки */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }

        /* 1. КОНТЕЙНЕР ДЛЯ ФОНУ (Відео) */
        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Відео ЗАВЖДИ під усім */
            overflow: hidden;
            pointer-events: none; /* Не реагує на кліки */
        }

        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Відео заповнює весь екран без полос, як шпалери */
            filter: brightness(0.4) blur(1px); /* Затемнюємо і трохи розмиваємо фон */
        }

        /* 2. ШАР ДЛЯ СЕРДЕЧОК (Поверх відео) */
        #stage {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 10; /* Сердечка будуть НАД відео */
            pointer-events: none;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100; /* Кнопка найвище за все */
            transition: opacity 1s ease;
        }

        #start-btn {
            padding: 20px 50px;
            font-size: 24px;
            background: #ff4d94;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 77, 148, 0.7);
            z-index: 101;
            pointer-events: auto;
        }

        .heart {
            position: absolute;
            color: #ff4d94;
            user-select: none;
            filter: drop-shadow(0 0 8px #ff4d94);
            /* Перехід для плавного злітання на ходу */
            transition: all 4s cubic-bezier(0.25, 0.1, 0.25, 1);
            font-size: 20px;
        }

        #msg {
            position: absolute;
            bottom: 10%; /* Текст знизу, щоб не закривати серце */
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 2.5rem;
            text-align: center;
            text-shadow: 0 0 20px #ff4d94, 0 0 40px #ff4d94;
            display: none;
            z-index: 20;
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">ВІДКРИТИ ❤️</button>
    </div>

    <div id="video-container">
        <video id="bg-video" loop muted playsinline webkit-playsinline preload="auto">
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <div id="stage">
        <div id="msg">Все для тебе! ❤️</div>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('start-btn');
        const video = document.getElementById('bg-video');
        const audio = document.getElementById('bg-music');
        const overlay = document.getElementById('overlay');
        const stage = document.getElementById('stage');
        const msg = document.getElementById('msg');
        
        const totalHearts = 300; // Багато сердечок для повноти
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2 - 40; // Трохи вище центру
        const scale = 22; // Розмір великого серця

        btn.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                video.play();
                audio.play();
                startMagic();
            }, 1000);
        });

        function startMagic() {
            // Створюємо сердечка потік за потоком
            for (let i = 0; i < totalHearts; i++) {
                setTimeout(() => {
                    createHeart(i);
                }, i * 40); // Ефект лавини
            }
        }

        function createHeart(index) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            const icons = ['❤️', '💖', '💕', '💗', '💓'];
            heart.innerText = icons[Math.floor(Math.random() * icons.length)];
            
            // Початкова позиція (хаотично знизу екрана)
            heart.style.left = (Math.random() * 100) + 'vw';
            heart.style.top = '110vh';
            heart.style.opacity = '0';
            stage.appendChild(heart);

            // Розрахунок позиції у формі повного серця
            const t = (index / totalHearts) * 2 * Math.PI;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

            // Запускаємо плавну анімацію руху "на ходу"
            setTimeout(() => {
                heart.style.left = (centerX + x * scale) + 'px';
                heart.style.top = (centerY + y * scale) + 'px';
                heart.style.transform = `scale(${Math.random() * 0.5 + 1.2})`; // Збільшуємо у формі
                heart.style.opacity = '1';
            }, 50);

            // Коли останнє сердечко стане на місце, показуємо текст
            if (index === totalHearts - 1) {
                setTimeout(() => {
                    msg.style.display = 'block';
                    setTimeout(() => msg.style.opacity = '1', 100);
                }, 5000);
            }
        }
    </script>
</body>
</html>
