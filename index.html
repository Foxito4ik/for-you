<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебе ❤️</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 26, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.5s;
        }

        #start-btn {
            padding: 20px 50px; font-size: 24px;
            background: #ff4d94; color: white; border: none;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 77, 148, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .message {
            position: absolute; width: 100%; text-align: center;
            top: 45%; z-index: 10; color: white;
            font-size: 5rem; font-weight: bold;
            text-shadow: 0 0 20px #ff4d94, 0 0 40px #ff4d94;
            display: none; pointer-events: none;
        }

        .heart {
            position: absolute; z-index: 5; color: #ff4d94;
            user-select: none; animation: move linear infinite;
            filter: drop-shadow(0 0 8px #ff4d94);
        }

        @keyframes move {
            0% { transform: translateY(110vh) rotate(0deg) scale(0.5); opacity: 1; }
            100% { transform: translateY(-20vh) rotate(360deg) scale(2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">ВІДКРИТИ ПОДАРУНОК 🎁</button>
    </div>

    <div class="message" id="msg">ВСЕ ДЛЯ ТЕБЕ! ❤️</div>

    <audio id="audio">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('start-btn');
        const audio = document.getElementById('audio');
        const msg = document.getElementById('msg');
        const overlay = document.getElementById('overlay');

        btn.addEventListener('click', () => {
            // Спроба відтворити аудіо
            audio.play().then(() => {
                console.log("Музика грає!");
            }).catch(error => {
                console.log("Помилка відтворення:", error);
                alert("Будь ласка, перевір, чи файл music.mp3 лежить у папці з кодом.");
            });

            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                msg.style.display = 'block';
                startHeartFall();
            }, 500);
        });

        function startHeartFall() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                const icons = ['❤️', '💖', '💕', '💗', '💓', '🔥'];
                heart.innerText = icons[Math.floor(Math.random() * icons.length)];
                
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.fontSize = Math.random() * 40 + 20 + "px";
                heart.style.animationDuration = Math.random() * 2 + 2 + "s";
                
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 60); // Лавина сердечок!
        }
    </script>
</body>
</html>
